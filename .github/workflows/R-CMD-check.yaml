name: R-CMD-check

on:
  push:
  pull_request:

jobs:
  R-CMD-check:
    strategy:
      fail-fast: false
      matrix:
        config:
          # Current testthat requires R >= 4.1; keep this explicit rather
          # than relying only on rolling release aliases.
          - {os: ubuntu-latest, r: '4.1'}
          - {os: ubuntu-latest, r: release}
          - {os: ubuntu-latest, r: oldrel-1}
          - {os: ubuntu-latest, r: devel}
          - {os: windows-latest, r: release}
          - {os: macos-latest, r: release}
    runs-on: ${{ matrix.config.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::pkgload
      - uses: r-lib/actions/check-r-package@v2
      - name: Run benchmark smoke test
        if: matrix.config.os == 'ubuntu-latest' && matrix.config.r == 'release'
        run: |
          R CMD INSTALL .
          BENCHMARK_ROOT=$PWD BENCHMARK_ENGINE=batch E2E_SIZES=100 BENCH_REPS=1 Rscript benchmarks/benchmark-liljegren-three-way.R
          LILJEGREN_PARALLEL_ROWS=1000 LILJEGREN_WORKERS=1,2 BENCH_REPS=1 Rscript benchmarks/benchmark-liljegren-workers.R
